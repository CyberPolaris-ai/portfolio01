<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱 - ビジネスアライグマ</title>
<style>
  :root {
    --bg-color: #f5f0e8;
    --primary: #2c3e6b;
    --accent: #8b3a3a;
    --text-color: #3a3226;
    --card-shadow: rgba(0,0,0,0.15);
    --match-glow: rgba(255,215,0,0.7);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    overflow-x: hidden;
    font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px;
  }

  .game-header {
    text-align: center;
    margin-bottom: 10px;
  }

  .game-header h1 {
    font-size: 1.4rem;
    color: var(--primary);
    letter-spacing: 0.05em;
  }

  .game-header p {
    font-size: 0.8rem;
    color: #8a7e6e;
    margin-top: 2px;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 560px;
    padding: 8px 4px;
    margin-bottom: 10px;
    gap: 8px;
  }

  .status-item {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--primary);
    white-space: nowrap;
  }

  .restart-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .restart-btn:hover {
    background: #3d5291;
  }

  .restart-btn:active {
    transform: scale(0.95);
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px 20px;
    color: var(--primary);
    font-size: 1rem;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #ddd;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Game Board */
  .game-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 560px;
    padding: 0 2px;
  }

  /* Card */
  .card {
    aspect-ratio: 1 / 1;
    perspective: 800px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s ease;
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }

  /* Card Front (face-down side) */
  .card-front {
    background: var(--primary);
    background-image:
      linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px var(--card-shadow);
  }

  .card-front::after {
    content: '🦝';
    font-size: 2.8rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  /* Card Back (face-up side with image) */
  .card-back {
    transform: rotateY(180deg);
    background: var(--bg-color);
    border: 3px solid #d4c9b8;
    box-shadow: 0 2px 8px var(--card-shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }

  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 6px;
  }

  /* Match effect */
  .card.matched .card-front,
  .card.matched .card-back {
    border-color: gold;
  }

  .card.matched {
    animation: matchPulse 0.4s ease;
  }

  @keyframes matchPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  .card.matched .card-back {
    box-shadow: 0 0 12px var(--match-glow), 0 2px 8px var(--card-shadow);
  }

  /* Mismatch shake */
  .card.shake .card-inner {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }

  /* Overlay */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .overlay.show {
    display: flex;
  }

  .overlay-content {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: popIn 0.4s ease;
  }

  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .overlay-content h2 {
    font-size: 1.5rem;
    color: var(--primary);
    margin-bottom: 6px;
  }

  .overlay-content .emoji {
    font-size: 3rem;
    margin-bottom: 8px;
  }

  .overlay-content .stats {
    font-size: 1rem;
    color: var(--text-color);
    margin: 12px 0 20px;
    line-height: 1.8;
  }

  .score-display {
    font-size: 1.3rem;
    color: var(--primary);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #e0d8cc;
  }

  .score-hint {
    font-size: 0.8rem;
    color: #8a7e6e;
    margin-top: 2px;
  }

  .overlay-content .restart-btn {
    font-size: 1rem;
    padding: 10px 28px;
  }

  /* Wrapper for overlay positioning */
  .game-wrapper {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .game-board {
      gap: 6px;
    }
    .card-front::after {
      font-size: 2rem;
    }
    .game-header h1 {
      font-size: 1.2rem;
    }
    .status-item {
      font-size: 0.85rem;
    }
  }

  @media (max-width: 360px) {
    .game-board {
      gap: 4px;
    }
    .card-front::after {
      font-size: 1.6rem;
    }
    body {
      padding: 8px 4px;
    }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <header class="game-header">
    <h1>🦝 神経衰弱 ビジネスアライグマ</h1>
    <p>同じカードのペアを見つけよう！</p>
  </header>

  <div class="status-bar">
    <span class="status-item">手数: <span id="moveCount">0</span></span>
    <span class="status-item">時間: <span id="timer">00:00</span></span>
    <button class="restart-btn" id="restartBtn">もう一度遊ぶ</button>
  </div>

  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <span>画像を読み込み中...</span>
  </div>

  <div class="game-board" id="gameBoard" style="display:none;"></div>

  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <div class="emoji">🎉</div>
      <h2>お疲れ様でした！</h2>
      <div class="stats">
        <div>手数: <strong id="finalMoves">0</strong></div>
        <div>時間: <strong id="finalTime">00:00</strong></div>
        <div class="score-display">スコア: <strong id="finalScore">0</strong> 点</div>
        <div class="score-hint">8手・60秒で解けたら1000点だよ！</div>
      </div>
      <button class="restart-btn" id="overlayRestartBtn">もう一度遊ぶ</button>
    </div>
  </div>
</div>

<script>
  const IMAGES = [
    { id: 1, src: 'images/01.png', alt: 'よろしくお願いいたします' },
    { id: 2, src: 'images/02.png', alt: 'ご確認ください' },
    { id: 3, src: 'images/03.png', alt: '承知いたしました' },
    { id: 4, src: 'images/04.png', alt: 'お疲れ様でした' },
    { id: 5, src: 'images/05.png', alt: '少々お待ちください' },
    { id: 6, src: 'images/06.png', alt: 'ありがとうございます' },
    { id: 7, src: 'images/07.png', alt: 'お世話になっております' },
    { id: 8, src: 'images/08.png', alt: '以上、よろしくお願いします' },
  ];

  let state = {
    cards: [],
    flippedCards: [],
    matchedPairs: 0,
    moves: 0,
    seconds: 0,
    timerInterval: null,
    timerStarted: false,
    isLocked: false,
  };

  const $board = document.getElementById('gameBoard');
  const $loading = document.getElementById('loading');
  const $moveCount = document.getElementById('moveCount');
  const $timer = document.getElementById('timer');
  const $overlay = document.getElementById('overlay');
  const $finalMoves = document.getElementById('finalMoves');
  const $finalTime = document.getElementById('finalTime');
  const $finalScore = document.getElementById('finalScore');

  // Fisher-Yates shuffle
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function formatTime(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function startTimer() {
    if (state.timerStarted) return;
    state.timerStarted = true;
    state.timerInterval = setInterval(() => {
      state.seconds++;
      $timer.textContent = formatTime(state.seconds);
    }, 1000);
  }

  function stopTimer() {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }

  function createCardEl(cardData, index) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = cardData.id;
    card.dataset.index = index;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">
          <img src="${cardData.src}" alt="${cardData.alt}" draggable="false">
        </div>
      </div>
    `;
    return card;
  }

  function initGame() {
    // Reset state
    stopTimer();
    state = {
      cards: [],
      flippedCards: [],
      matchedPairs: 0,
      moves: 0,
      seconds: 0,
      timerInterval: null,
      timerStarted: false,
      isLocked: false,
    };

    $moveCount.textContent = '0';
    $timer.textContent = '00:00';
    $overlay.classList.remove('show');

    // Create pairs and shuffle
    const pairs = [...IMAGES, ...IMAGES];
    state.cards = shuffle(pairs);

    // Build board
    $board.innerHTML = '';
    state.cards.forEach((cardData, i) => {
      $board.appendChild(createCardEl(cardData, i));
    });
  }

  function handleCardClick(e) {
    const card = e.target.closest('.card');
    if (!card) return;
    if (state.isLocked) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;
    if (state.flippedCards.length >= 2) return;

    startTimer();
    card.classList.add('flipped');
    state.flippedCards.push(card);

    if (state.flippedCards.length === 2) {
      state.moves++;
      $moveCount.textContent = state.moves;
      checkMatch();
    }
  }

  function checkMatch() {
    const [card1, card2] = state.flippedCards;
    const isMatch = card1.dataset.id === card2.dataset.id &&
                    card1.dataset.index !== card2.dataset.index;

    state.isLocked = true;

    if (isMatch) {
      card1.classList.add('matched');
      card2.classList.add('matched');
      state.matchedPairs++;
      state.flippedCards = [];
      state.isLocked = false;

      if (state.matchedPairs === IMAGES.length) {
        setTimeout(gameComplete, 500);
      }
    } else {
      card1.classList.add('shake');
      card2.classList.add('shake');

      setTimeout(() => {
        card1.classList.remove('flipped', 'shake');
        card2.classList.remove('flipped', 'shake');
        state.flippedCards = [];
        state.isLocked = false;
      }, 800);
    }
  }

  function calcScore(moves, seconds) {
    const score = 1000 * (8 / moves) * (60 / Math.max(seconds, 1));
    return Math.max(0, Math.round(score));
  }

  function gameComplete() {
    stopTimer();
    $finalMoves.textContent = state.moves;
    $finalTime.textContent = formatTime(state.seconds);
    $finalScore.textContent = calcScore(state.moves, state.seconds);
    $overlay.classList.add('show');
  }

  // Preload images, then start
  function preloadImages() {
    return Promise.all(
      IMAGES.map(img => new Promise((resolve) => {
        const image = new Image();
        image.onload = resolve;
        image.onerror = resolve;
        image.src = img.src;
      }))
    );
  }

  // Event listeners
  $board.addEventListener('click', handleCardClick);
  document.getElementById('restartBtn').addEventListener('click', initGame);
  document.getElementById('overlayRestartBtn').addEventListener('click', initGame);

  // Init
  preloadImages().then(() => {
    $loading.style.display = 'none';
    $board.style.display = 'grid';
    initGame();
  });
</script>
</body>
</html>
